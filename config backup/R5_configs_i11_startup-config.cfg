!
!
!
!

!
upgrade fpd auto
version 15.3
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname ISP2
!
boot-start-marker
boot-end-marker
!
aqm-register-fnf
!
!
no aaa new-model
no ip icmp rate-limit unreachable
!
!
!
ip vrf HA
 rd 100:1
 route-target export 100:1
 route-target import 100:1
!
!
!
!
no ip domain lookup
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
!
redundancy
!
!
ip tcp synwait-time 5
! 
!
!
!
!
!
!
!
!
!
interface Loopback1
 ip address 82.82.81.1 255.255.255.255
!
interface Loopback8
 ip address 8.8.8.8 255.255.255.255
!
interface Ethernet0/0
 no ip address
 shutdown
 duplex auto
!
interface GigabitEthernet0/0
 description TO DC-RE1 for vpn
 ip address 82.2.1.2 255.255.255.252
 duplex full
 speed 1000
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description TO B1-RE1 for vpn
 ip address 82.2.3.2 255.255.255.252
 negotiation auto
!
interface GigabitEthernet2/0
 description TO B1-RE2 for mpls
 ip vrf forwarding HA
 ip address 82.2.4.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 negotiation auto
!
interface GigabitEthernet3/0
 description TO DC-RE2 for mpls
 ip vrf forwarding HA
 ip address 82.2.2.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 negotiation auto
!
interface GigabitEthernet4/0
 description TO B2-RE1 for vpn
 ip address 82.2.5.2 255.255.255.252
 negotiation auto
!
interface GigabitEthernet5/0
 description TO B2-RE2 for mpls
 ip vrf forwarding HA
 ip address 82.2.6.2 255.255.255.252
 ip ospf network point-to-point
 ip ospf 1 area 0
 negotiation auto
!
interface GigabitEthernet6/0
 no ip address
 shutdown
 negotiation auto
!
router ospf 1 vrf HA
!
router ospf 5
 network 82.2.1.0 0.0.0.3 area 0
 network 82.2.3.0 0.0.0.3 area 0
 network 82.2.5.0 0.0.0.3 area 0
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
!
no cdp log mismatch duplex
!
!
!
control-plane
!
!
mgcp behavior rsip-range tgcp-only
mgcp behavior comedia-role none
mgcp behavior comedia-check-media-src disable
mgcp behavior comedia-sdp-force disable
!
mgcp profile default
!
!
!
gatekeeper
 shutdown
!
!
line con 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line aux 0
 exec-timeout 0 0
 privilege level 15
 logging synchronous
 stopbits 1
line vty 0 4
 login
 transport input all
!
!
end
