!

!
upgrade fpd auto
version 15.3
service timestamps debug datetime msec
service timestamps log datetime msec
no service password-encryption
!
hostname DC-RE2
!
boot-start-marker
boot-end-marker
!
aqm-register-fnf
!
!
aaa new-model
!
!
aaa group server radius RADIUS_GROUP
 server name NPS_SERVER
!
aaa authentication login default group RADIUS_GROUP local
aaa authorization exec default group RADIUS_GROUP local 
!
!
!
!
!
aaa session-id common
clock timezone AST 3 0
no ip icmp rate-limit unreachable
!
!
!
!
!
!
no ip domain lookup
ip domain name hahs.org
ip cef
no ipv6 cef
!
multilink bundle-name authenticated
!
!
!
!
!
!
!
!
!
username arslan privilege 15 secret 5 $1$C1Zx$kazjZEFWgi.CktNg5a9zp1
!
redundancy
!
!
ip tcp synwait-time 5
! 
!
crypto isakmp policy 10
 encr aes 256
 authentication pre-share
 group 5
 lifetime 80000
crypto isakmp key P2X4Phahs address 82.1.4.1       
crypto isakmp key P2X4Phahs address 82.1.6.1       
!
!
crypto ipsec transform-set vpnaz esp-aes esp-sha-hmac 
 mode tunnel
!
!
crypto ipsec profile proaz
 set transform-set vpnaz 
!
!
!
!
!
!
!
interface Loopback0
 ip address 172.16.10.2 255.255.255.255
 ip nat inside
 ip virtual-reassembly in
 ip ospf 1 area 1
!
interface Tunnel1
 ip address 10.10.10.1 255.255.255.0
 no ip redirects
 ip mtu 1400
 ip nhrp authentication P2X4Pha
 ip nhrp map multicast dynamic
 ip nhrp network-id 123
 ip nhrp redirect
 ip tcp adjust-mss 1360
 ip ospf network point-to-multipoint
 ip ospf 1 area 0
 tunnel source GigabitEthernet3/0
 tunnel mode gre multipoint
 tunnel protection ipsec profile proaz
!
interface Ethernet0/0
 no ip address
 shutdown
 duplex auto
!
interface GigabitEthernet0/0
 description Link to DC-Core1
 ip address 10.10.23.1 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 p2x4pD9R6Y++
 ip ospf network point-to-point
 ip ospf 1 area 1
 duplex full
 speed auto
 media-type gbic
 negotiation auto
!
interface GigabitEthernet1/0
 description Link to DC-Core2 
 ip address 10.10.24.1 255.255.255.252
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 p2x4pD9R6Y++
 ip ospf network point-to-point
 ip ospf 1 area 1
 negotiation auto
!
interface GigabitEthernet2/0
 description Link to DC-RE1 
 ip address 10.10.12.2 255.255.255.248
 ip nat inside
 ip virtual-reassembly in
 ip ospf authentication message-digest
 ip ospf message-digest-key 1 md5 p2x4pD9R6Y++
 ip ospf network point-to-point
 ip ospf 1 area 1
 glbp 1 ip 10.10.12.3
 glbp 1 priority 110
 negotiation auto
!
interface GigabitEthernet3/0
 description Link to ISP 1 for vpn
 ip address 82.1.2.1 255.255.255.252
 ip nat outside
 ip virtual-reassembly in
 negotiation auto
!
interface GigabitEthernet4/0
 description Link to ISP 2 for mpls
 ip address 82.2.2.1 255.255.255.252
 ip virtual-reassembly in
 ip ospf network point-to-point
 ip ospf 1 area 0
 negotiation auto
!
router ospf 1
 router-id 172.16.10.2
!
ip forward-protocol nd
no ip http server
no ip http secure-server
!
!
ip nat inside source list 10 interface GigabitEthernet3/0 overload
ip route 82.1.0.0 255.255.0.0 GigabitEthernet3/0
!
ip radius source-interface Loopback0 
no cdp log mismatch duplex
